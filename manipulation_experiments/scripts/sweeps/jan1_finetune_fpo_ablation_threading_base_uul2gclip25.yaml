program: finetune_online_rl.py
method: grid  # Can be: grid, random, bayes
name: finetune_fpo_ablation_threading_base_uul2gclip25
# Base policy is u prediction / u loss mode / l2 loss / gradient clipping 25
project: flow-bc-fpo-finetuning  # Set your W&B project name here
entity: far-wandb  # Optional: Set your W&B entity/team name


# Additional fixed parameters can be specified here
command:
  - ${env}
  - torchrun
  - --nproc_per_node=1
  - ${program}
  - --distributed
  - True
  - --base-policy-wandb-project
  - flow-bc
  - --base_policy_wandb_run_id
  - 6vqrn614
  - --load-ema
  - True
  - --checkpoint_step
  - step_10000
  - --wandb_project
  - flow-bc-fpo-finetuning
  - --experiment
  - finetune-fpo-ablation-threading-base-uul2gclip25-jan1-v1
  - --total_timesteps
  - 8_000_000
  - --gradient_accumulation_steps
  - 1
  - --num_minibatches
  - 8
  - --log_freq
  - 1
  - --save_freq
  - 2
  - --rollout_freq
  - 2
  - --task
  - TwoArmThreading
  - --eval_env
  - TwoArmThreading
  - --eval_num_episodes
  - 200
  - --wandb_enable
  - True
  - ${args} 

# let's set logging frequency to 60,000 (num_envs * data_collection_steps * rollout_freq
# 4 * 300 * 50 = 60,000
# 50 * 300 * 4 = 60,000
# 50 * 1200 * 1 = 60,000
# 25 * 600 * 4 = 60,000

parameters:

  seed: 
    values: [0, 1, 2]

  discount:
    values: [0.999]

  gae_lambda:
    values: [0.99]

  cfm_loss_huber_delta:
    values: [0.1]

  clip_coef:
    values: [0.01]

  spo_clip_coef:
    values: [0.01]

  do_chunk_level_ppo:
    values: [False, True]

  trust_region_mode:
    values: ['aspo', 'ppo']  

  cfm_loss_use_huber:
    values: [False, True]

  cfm_loss_average_group_size:
    values: [-1, 1]  

  clamp_logratio:
    values: [None, 5.0]

  clamp_old_cfm_loss:
    values: [None, 4.0]

  max_grad_norm:
    values: [1]

  n_action_samples:
    values: [8]

  num_envs:
    values: [30]

  freeze_vision_encoder:
    values: [True]

  zero_sampling:
    values: [True]
  
  sde_sigma:
    values: [0.0] 
    
  eval_ema:
    values: [False]
    
  exploration_noise_std:
    values: [None]

  data_collection_steps:
    values: [1600]

  n_action_steps:
    values: [16]

  sampling_steps:
    values: [10]
